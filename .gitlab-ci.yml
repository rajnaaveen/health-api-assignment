# ============================================================
# GitLab CI/CD Pipeline for HealthDetailApplication
# ============================================================

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  BUILD_VERSION: "$CI_COMMIT_SHORT_SHA"   # Injects git commit SHA as build version
  JAR_NAME: "healthdetail-0.0.1-SNAPSHOT.jar"

# Cache Maven dependencies across pipeline runs to speed up builds
cache:
  paths:
    - .m2/repository

# ── Pipeline Stages ──────────────────────────────────────────
stages:
  - build
  - test
  - package
  - security     # Optional: uncomment Veracode job below to activate
  - deploy       # Optional: uncomment AWS job below to activate

# ============================================================
# STAGE 1 — BUILD
# Compiles the source code without running tests
# ============================================================
build:
  stage: build
  image: maven:3.9.6-eclipse-temurin-17
  script:
    - echo "Building project with BUILD_VERSION=$BUILD_VERSION"
    - mvn clean compile -DskipTests
  only:
    - main
    - merge_requests

# ============================================================
# STAGE 2 — TEST
# Runs all unit tests and generates a report
# ============================================================
test:
  stage: test
  image: maven:3.9.6-eclipse-temurin-17
  script:
    - echo "Running unit tests..."
    - mvn test
  artifacts:
    when: always
    reports:
      junit: target/surefire-reports/*.xml   # GitLab reads this for test result UI
    paths:
      - target/surefire-reports/
    expire_in: 7 days
  only:
    - main
    - merge_requests

# ============================================================
# STAGE 3 — PACKAGE
# Packages the app into a JAR and exposes it as a GitLab artifact
# BUILD_VERSION is baked in via the environment variable
# ============================================================
package:
  stage: package
  image: maven:3.9.6-eclipse-temurin-17
  script:
    - echo "Packaging JAR with BUILD_VERSION=$BUILD_VERSION"
    - mvn package -DskipTests -DBUILD_VERSION=$BUILD_VERSION
  artifacts:
    name: "healthdetail-$CI_COMMIT_SHORT_SHA"
    paths:
      - target/*.jar        # The JAR is stored as a downloadable GitLab artifact
    expire_in: 30 days
  only:
    - main

# ============================================================
# STAGE 4 — SECURITY SCANNING (Veracode)
#
# HOW TO ADD VERACODE:
# 1. Store your Veracode API credentials in GitLab:
#    Settings → CI/CD → Variables
#    Add: VERACODE_API_ID and VERACODE_API_KEY
#
# 2. Veracode scans the packaged JAR using their Pipeline Scanner.
#    The scanner is downloaded fresh each run (official approach).
#
# 3. 'allow_failure: true' means a scan finding won't block deployment.
#    Set to 'false' to enforce a security gate (recommended for production).
#
# 4. You can also add SAST using GitLab's built-in free scanner:
#    Just include the template below (no Veracode account needed):
#    include:
#      - template: Security/SAST.gitlab-ci.yml

# ============================================================
# STAGE 5 — DEPLOY TO AWS
#
# HOW TO ADD AWS DEPLOYMENT:
# 1. Store AWS credentials in GitLab:
#    Settings → CI/CD → Variables
#    Add: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_DEFAULT_REGION
#
# 2. Choose your deployment target:
#
#    Option A — AWS Elastic Beanstalk (simplest):
#      - Zips the JAR and uploads it to S3
#      - Creates a new Beanstalk application version
#      - Triggers environment update (rolling deploy)
#
#    Option B — AWS ECS (containerized):
#      - Build a Docker image from the JAR
#      - Push to Amazon ECR (Elastic Container Registry)
#      - Update the ECS service to use the new image
#      - ECS handles rolling update with zero downtime
#
#    Option C — AWS EC2 (direct):
#      - SCP the JAR to your EC2 instance
#      - SSH in and restart the systemd service
#
